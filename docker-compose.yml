services:
  app:
    build: .
    container_name: open-receipt-ocr-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_PATH=/app/data/invoice.sqlite
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
    volumes:
      # Path to store DB (for now), we might store more data in there in the future
      - ${DATA_PATH_VOLUME:-./data}:/app/data
      # Path to store the uploads
      - ${UPLOADS_PATH_VOLUME:-./uploads}:/app/uploads
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:7-alpine
    container_name: open-receipt-ocr-redis
    ports:
      - "6379:6379"
    restart: always
