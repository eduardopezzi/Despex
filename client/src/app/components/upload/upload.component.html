<section class="upload-container">
  <div class="upload-card">
    <h2>Upload New Invoice</h2>
    <p>Select a PDF or image file (JPG, PNG) to start OCR processing.</p>
    
    <div class="input-group">
      <input type="file" (change)="onFileSelected($event)" accept="image/*,application/pdf" #fileInput>
      <button (click)="onUpload()" [disabled]="!file() || uploading()" class="btn-primary">
        {{ uploading() ? 'Uploading...' : 'Upload & Process' }}
      </button>
    </div>

    <div *ngIf="message()" class="status-message">
      {{ message() }}
    </div>
  </div>
</section>
